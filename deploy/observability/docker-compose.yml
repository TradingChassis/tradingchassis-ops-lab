services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "127.0.0.1:${TC_PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:${TC_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ../../dashboards/grafana/tradingchassis-ops-lab-run-observability.json:/var/lib/grafana/dashboards/tradingchassis-ops-lab-run-observability.json:ro,z
